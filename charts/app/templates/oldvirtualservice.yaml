{{- $appName := include "app.toLower" .Values.appName -}}
{{- $envDnsInternal := include "app.envValue" (dict "Values" .Values "Key" "dnsInternal" "Env" .Values.awsAccountAlias) | fromYaml -}}

{{- if .Values.oldHost }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: old-{{ $appName }}-{{ .Values.namespace }}-vs
  namespace: istio-system
spec:
  hosts:
  - {{ .Values.oldHost }}
  gateways:
  - old-istio-gateway
  http:
  - route:
    - destination:
        host: {{ $appName }}-service.{{ .Values.namespace }}.svc.cluster.local
        port:
          number: 80
{{- end }}