appName: app
namespace: default
environmentName: Default
awsAccountAlias: Default # 'Sandbox', 'Production', 'PciProduction'

image:
  repository: nginx
  tag: latest
  port: 80

resources:
  Sandbox:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 256Mi
  Production:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 512Mi
  PciProduction:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 512Mi

autoscaling:
  Sandbox:
    minReplicas: 1
    maxReplicas: 1
    # targetCPUUtilizationPercentage: 90
    # targetMemoryUtilizationPercentage: 85
    targetCPUAverageValue: 100m
    targetMemoryAverageValue: 256Mi
  Production:
    minReplicas: 2
    maxReplicas: 10
    # targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 75
    targetCPUAverageValue: 200m
    targetMemoryAverageValue: 448Mi
  PciProduction:
    minReplicas: 2
    maxReplicas: 10
    # targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 75
    targetCPUAverageValue: 200m
    targetMemoryAverageValue: 448Mi

liveness:
  httpGet:
    path: /hc
    port: 80
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 5

readiness: 
  httpGet:
    path: /hc
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 5

env:
  Default:

serviceAccount:
  Default:
    roleArn: ""

dnsInternal:
  Sandbox:
    domain: snb-r1.55tech-internal.com
    gateways:
    - istio-gateway
  Production:
    domain: prd-r1.55tech-internal.com
    gateways:
    - istio-gateway
  PciProduction:
    domain: service-r1.55tech-internal.com
    gateways:
     - istio-gateway

oldHost: ""

deployment:
  gracefulShutdown:
    terminationGracePeriodSeconds: 30

mapConfigMapToEnv:
  generalName: general-config-map
  awsAccountName: aws-account-config-map